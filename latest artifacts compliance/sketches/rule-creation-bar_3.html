<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', 'Arial', sans-serif;
    background: #f0f2f4;
    padding: 40px;
  }

  .bar {
    background: #e8eaed;
    border: 1px solid #c8cdd3;
    border-radius: 3px;
    padding: 6px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 600px;
  }

  .bar-title {
    font-size: 12px;
    font-weight: 600;
    color: #1a202c;
  }

  .icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .icon {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: #1a202c;
    cursor: pointer;
    line-height: 1;
  }

  .icon[title="Help"] {
    border: 2px solid #1a202c;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="bar">
    <span class="bar-title">Rule Creation</span>
    <div class="icons">
      <span class="icon" title="Settings">⚙</span>
      <span class="icon" title="Help">?</span>
    </div>
  </div>
</body>
</html>
