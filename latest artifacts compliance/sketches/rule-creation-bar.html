<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', 'Arial', sans-serif;
    background: #f0f2f4;
    padding: 40px;
  }

  .bar {
    background: #e8eaed;
    border: 1px solid #c8cdd3;
    border-radius: 3px;
    padding: 6px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 600px;
  }

  .bar-title {
    font-size: 12px;
    font-weight: 600;
    color: #1a202c;
  }

  .icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .icon {
    width: 16px;
    height: 16px;
    background: #1a202c;
    border-radius: 50%;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="bar">
    <span class="bar-title">Rule Creation</span>
    <div class="icons">
      <div class="icon"></div>
      <div class="icon"></div>
    </div>
  </div>
</body>
</html>
